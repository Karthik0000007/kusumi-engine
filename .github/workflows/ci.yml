name: Kasumi Engine CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  go-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Go Vet
        run: cd ingestion && go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ingestion
      - name: Go Test
        run: cd ingestion && go test -race -coverprofile=coverage.out ./...

  python-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd retrieval
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: cd retrieval && python -m ruff check .
      - name: MyPy
        run: cd retrieval && python -m mypy retrieval/
      - name: Pytest
        run: cd retrieval && python -m pytest tests/ --cov=retrieval

  cpp-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake cpplint clang-format
      - name: Cpplint
        run: find reranking/src reranking/include -name '*.cpp' -o -name '*.h' | xargs -r cpplint
      - name: CMake Build
        run: |
          mkdir -p reranking/build
          cd reranking/build
          cmake ..
          cmake --build .
      - name: CTest
        run: |
          cd reranking/build
          ctest --output-on-failure

  docker-build:
    runs-on: ubuntu-latest
    needs: [go-lint-test, python-lint-test, cpp-lint-test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # We don't have the dockerfiles yet, so we just run a placeholder or skip
      - name: Placeholder Docker Build
        run: echo "Docker builds will be added when Dockerfiles are created"
